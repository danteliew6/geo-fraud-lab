resources:
  dashboards:
    geo_fraud_dashboard:
      display_name: "Geo Fraud Command Center"
      file_path: ../dashboards/geo_fraud.lvdash.json
      warehouse_id: ${var.warehouse_id}
      # Dataset queries are schema-qualified (geo_fraud_lab.<table>) so they never
      # resolve against the warehouse's default schema. dataset_catalog supplies the
      # leading catalog at deploy time (e.g. workspace.geo_fraud_lab.<table>).
      dataset_catalog: ${var.catalog}

    tunaiku_c360_dashboard:
      display_name: "Tunaiku Lending 360"
      file_path: ../dashboards/tunaiku_c360.lvdash.json
      warehouse_id: ${var.warehouse_id}
      dataset_catalog: ${var.catalog}
