resources:
  jobs:
    install_geo_fraud_lab:
      name: "[geo-fraud-lab] Install"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/01_generate_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: serverless

        - task_key: run_sql
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/02_run_sql.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: serverless

        - task_key: deploy_dashboard
          depends_on:
            - task_key: run_sql
          notebook_task:
            notebook_path: ../notebooks/03_deploy_dashboard.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: serverless

      environments:
        - environment_key: serverless
          spec:
            client: "1"
