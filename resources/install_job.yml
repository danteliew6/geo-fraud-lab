resources:
  jobs:
    install_geo_fraud_lab:
      name: "[geo-fraud-lab] Install"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/01_generate_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: serverless

        - task_key: run_sql
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/02_run_sql.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              # Root of the bundle files synced into the workspace. The notebook
              # reads the SQL layers from ${sql_path}/sql — fully self-contained,
              # no GitHub fetch and no SQL-warehouse dependency.
              sql_path: ${workspace.file_path}
          environment_key: serverless

      environments:
        - environment_key: serverless
          spec:
            client: "1"
