bundle:
  name: geo-fraud-lab

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog catalog (must already exist)"
    default: main
  schema:
    description: "Schema to create (auto-created)"
    default: geo_fraud_lab
  warehouse_id:
    description: "SQL warehouse ID for the dashboard (find in SQL Warehouses > Connection details)"
    default: ""

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
