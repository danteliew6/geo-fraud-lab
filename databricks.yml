bundle:
  name: geo-fraud-lab

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog catalog (must already exist). Free Edition: use 'workspace'."
    default: workspace
  schema:
    description: "Schema to create (auto-created)."
    default: geo_fraud_lab
  warehouse_id:
    description: >-
      SQL warehouse that backs the dashboards. Defaults to the Free Edition
      'Serverless Starter Warehouse'. Override on other workspaces with
      --var="warehouse_id=<id>".
    lookup:
      warehouse: "Serverless Starter Warehouse"

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
